<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required Meta Tags -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="robots" content="noindex, nofollow" />

  <title>Donate | moealturej</title>
  <link rel="icon" href="https://i.postimg.cc/63hbBb6B/New-logo.jpg" type="image/x-icon" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #12002b;
      --bg2: #000a1a;
      --accent: #bb00ff;
      --accent-hover: #e600ff;
      --text-main: #eeeeee;
      --text-secondary: #bbbbbb;
      --card-bg: rgba(20, 10, 30, 0.9);
      --border: #bb00ff;
      --shadow: rgba(0, 0, 0, 0.6);
      --transition: 0.3s ease;
      --anim-time: 0.5s;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text-main);
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #particles-js {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }

    .donation-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 8px 30px var(--shadow);
      max-width: 500px;
      width: 100%;
      animation: fadeIn var(--anim-time) ease both;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-hover);
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }

    p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0.5rem auto;
      padding: 0.75rem 2rem;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      color: var(--bg2);
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 0 16px var(--accent-hover);
      transition: transform var(--transition), box-shadow var(--transition);
      font-size: 1rem;
      text-align: center;
    }

    .btn i { margin-right: 8px; }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px var(--accent-hover);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body>
  <div id="particles-js"></div>

  <div class="donation-card">
    <h1>💜 Support the Project</h1>
    <p>Your generosity helps keep everything running and fuels new features. Every contribution, big or small, is deeply appreciated!</p>

    <!-- 1. Stripe Hosted Payment Link -->
    <a class="btn" href="https://buy.stripe.com/aEU5lc5Ajf276vmdQQ" target="_blank">
      <i class="fab fa-stripe-s"></i> Donate via Stripe
    </a>

    <!-- 2. PayPal -->
    <a class="btn" href="https://www.paypal.com/donate/?business=3N5JTW6SEY5SL&no_recurring=1&currency_code=USD" target="_blank">
      <i class="fab fa-paypal"></i> Donate via PayPal
    </a>

    <!-- 3. Discord -->
    <a class="btn" href="https://discord.gg/moealturej" target="_blank">
      <i class="fab fa-discord"></i> Join our Discord
    </a>
  </div>

  <script>
    window.onload = function() {
      particlesJS('particles-js', {
        particles: {
          number: { value: 80, density: { enable: true, value_area: 800 } },
          color: { value: '#bb00ff' },
          shape: { type: 'circle' },
          opacity: { value: 0.5 },
          size: { value: 3 },
          move: { enable: true, speed: 2 }
        },
        interactivity: {
          events: {
            onhover: { enable: true, mode: 'repulse' },
            onclick: { enable: true, mode: 'push' }
          }
        }
      });
    };
  </script>
</body>
</html>
