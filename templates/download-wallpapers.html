<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpaper Downloads | moealturej</title>
  <link rel="icon" href="https://i.postimg.cc/63hbBb6B/New-logo.jpg" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-start: #050012;
      --bg-end: #20003f;
      --card-bg: rgba(255, 255, 255, 0.06);
      --accent: #bb00ff;
      --accent-hover: #e600ff;
      --text-main: #ececec;
      --text-muted: #aaa;
      --transition: 0.3s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
      font-family: 'Roboto', sans-serif; color: var(--text-main); padding: 2rem; overflow: hidden;
    }
    #particles-js { position: fixed; inset: 0; z-index: -1; }
    .container {
      background: var(--card-bg); border-radius: 16px;
      padding: 2rem; max-width: 600px; width: 100%; text-align: center;
      backdrop-filter: blur(12px); box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
      animation: fadeIn 0.6s both;
      position: relative; z-index: 1;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text; color: transparent;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); }
    }
    p.description {
      margin-bottom: 2rem; color: var(--text-muted);
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; background: var(--accent);
      color: #000; font-weight: bold; border: none; border-radius: 8px;
      cursor: pointer; text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(230, 0, 255, 0.6);
    }
    .btn-row { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .footer-link { font-size: 0.9rem; color: var(--text-muted); }
    .footer-link a { color: var(--accent); text-decoration: none; margin-left: 0.25rem; }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="container">
    <h1>Free Wallpaper Engine Files</h1>
    <p class="description">
      Here you can download all the wallpapers submitted through the portal. If you’d like to support this project and help keep it running, consider making a donation!
    </p>

    <div class="btn-row">
      <a class="btn" href="https://mega.nz/folder/daF0gJyY#z9u2EXgqMnHNRm5uln0nig" target="_blank">
        <i class="fas fa-download"></i> Download Wallpapers
      </a>
      <a class="btn" href="/submit-wallpaper">
        <i class="fas fa-upload"></i> Submit Wallpapers
      </a>
      <a class="btn" href="/donate" target="_blank">
        <i class="fas fa-heart"></i> Donate to Support
      </a>
    </div>

    <div class="footer-link">
      <p>Made with 💜 by moealturej</p>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js';
      document.body.appendChild(script);
      script.onload = () => {
        particlesJS('particles-js', {
          particles: {
            number: { value: 60, density: { enable: true, value_area: 800 } },
            color: { value: ['#bb00ff', '#e600ff'] },
            shape: { type: 'circle', stroke: { width: 1, color: '#e600ff' } },
            opacity: { value: 0.4, random: true, anim: { enable: true, speed: 1, opacity_min: 0.1 } },
            size: { value: 3, random: true, anim: { enable: true, speed: 4, size_min: 0.5 } },
            move: { enable: true, speed: 1.2, out_mode: 'out' }
          },
          interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' } },
            modes: { grab: { distance: 120, line_linked: { opacity: 0.4 } }, push: { particles_nb: 4 } }
          },
          retina_detect: true
        });
      };
    });
  </script>
</body>
</html>
