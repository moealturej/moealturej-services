<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta Tags & SEO -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Wallpapers | moealturej</title>

  <!-- Favicon & Fonts -->
  <link rel="icon" href="https://i.postimg.cc/63hbBb6B/New-logo.jpg" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --bg1: #060016;
      --bg2: #1a002f;
      --card-bg: rgba(255,255,255,0.04);
      --accent: #bb00ff;
      --accent-hover: #e600ff;
      --text-primary: #ececec;
      --text-secondary: #999;
      --input-border: rgba(255,255,255,0.2);
      --transition: 0.3s ease;
      --grid-gap: 1rem;
      --max-links: 10;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
      background:linear-gradient(145deg,var(--bg1),var(--bg2));
      font-family:'Roboto',sans-serif; color:var(--text-primary);
      overflow:auto; padding:2rem;
    }
    #particles-js{position:fixed;inset:0;z-index:-2;}
    .card {
      background:var(--card-bg);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:16px; padding:2rem; max-width:700px; width:100%;
      backdrop-filter:blur(14px); box-shadow:0 18px 60px rgba(0,0,0,0.8);
      animation:fadeIn 0.6s both;
      position:relative; z-index:1;
    }
    @keyframes fadeIn {
      from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}    
    }
    .icon { font-size:3rem; color:var(--accent); text-align:center; margin-bottom:0.5rem; }
    h1 {
      font-family:'Orbitron',sans-serif; text-align:center; font-size:2.25rem;
      background:linear-gradient(90deg,var(--accent),var(--accent-hover));
      -webkit-background-clip:text; color:transparent; margin-bottom:0.5rem;
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{transform:scale(1);}50%{transform:scale(1.1);}    
    }
    .subtitle { text-align:center; color:var(--text-secondary); margin-bottom:1rem; }
    .success-message {
      display:none; padding:1rem; margin:1rem auto;
      border:1px solid #00ff77; background:rgba(0,255,119,0.1);
      color:#00ff77; border-radius:8px; text-align:center;
      font-weight:bold; animation:fadeIn 0.4s both;
    }
    form { display:grid; gap:var(--grid-gap); }
    label { display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:0.25rem; }
    input {
      width:100%; padding:0.75rem; background:#111; color:var(--text-primary);
      border:1px solid var(--input-border); border-radius:8px;
      font-size:0.95rem; transition:border var(--transition),box-shadow var(--transition);
    }
    input:focus{outline:none;border-color:var(--accent-hover);box-shadow:0 0 8px var(--accent-hover);}
    .button--loading i{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);} }
    .link-row { display:flex; gap:0.5rem; align-items:flex-end; animation:fadeIn 0.4s both; }
    .add-btn, .remove-btn {
      display:flex; align-items:center; justify-content:center;
      width:2.5rem; height:2.5rem; border-radius:8px; border:none;
      font-size:1.2rem; transition:transform var(--transition), box-shadow var(--transition);
      cursor:pointer;
    }
    .add-btn {
      background:linear-gradient(90deg,var(--accent),var(--accent-hover));
      color:#000;
    }
    .add-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .add-btn:hover:not(:disabled){transform:scale(1.1);box-shadow:0 0 12px rgba(187,0,255,0.6);}
    .remove-btn {
      background:rgba(255,255,255,0.1); color:var(--text-secondary);
    }
    .remove-btn:hover{color:var(--accent-hover);transform:scale(1.1);}
    .count-note { text-align:right; font-size:0.85rem; color:var(--text-secondary); }
    .submit-wrapper{text-align:right;}
    .submit-wrapper button{
      padding:0.75rem 1.5rem; background:var(--accent); color:#000;
      border:none;border-radius:8px;font-size:0.9rem;font-weight:bold;
      cursor:pointer;transition:transform var(--transition),box-shadow var(--transition);
      display:inline-flex;align-items:center;gap:0.5rem;
    }
    .submit-wrapper button:hover{background:var(--accent-hover);transform:translateY(-3px);box-shadow:0 0 20px rgba(230,0,255,0.6);}
    .privacy-note{font-size:0.75rem;color:var(--text-secondary);text-align:center;}
    .footer-links{display:flex;justify-content:center;gap:1rem;margin-top:1rem;}
    .footer-links a{
      padding:0.5rem 1rem;background:rgba(255,255,255,0.1);
      border:1px solid var(--accent-hover);border-radius:8px;
      color:var(--accent);display:flex;align-items:center;gap:0.5rem;
      transition:transform var(--transition),box-shadow var(--transition);
    }
    .footer-links a:hover{transform:translateY(-2px);box-shadow:0 0 12px rgba(230,0,255,0.5);}
    @media(max-width:500px){
      .submit-wrapper{text-align:center}
      .submit-wrapper button{width:100%}
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="card" role="form" aria-labelledby="formTitle">
    <i class="fas fa-image icon" aria-hidden="true"></i>
    <h1 id="formTitle">Submit Wallpapers</h1>
    <p class="subtitle">Paste up to 10 Steam Workshop links plus your email. We’ll process them together and upload within 48 hours.</p>

    <div aria-live="polite" class="success-message" id="successMessage">
      <i class="fas fa-check-circle" aria-hidden="true"></i> Links submitted! Check the downloads page soon.
    </div>

    <form id="contactForm" method="POST" action="https://formspree.io/f/xanjjrnr" novalidate>
      <input type="text" name="website" autocomplete="off" style="display:none"/>

      <div>
        <label for="email"><i class="fas fa-envelope"></i> Email*</label>
        <input type="email" id="email" name="email" placeholder="you@domain.com" required />
      </div>

      <div class="count-note">Links: <span id="linkCount">1</span>/10</div>
      <div class="links-container" id="linksContainer">
        <div class="link-row">
          <div style="flex:1">
            <label><i class="fab fa-steam"></i> Workshop Link*</label>
            <input
              type="url"
              name="workshopLink1"
              placeholder="https://steamcommunity.com/sharedfiles/filedetails/?id=123456789"
              required
            />
          </div>
          <button
            type="button"
            class="add-btn"
            id="addLinkBtn"
            aria-label="Add another link"
            data-index="1"
          ><i class="fas fa-plus"></i></button>
        </div>
      </div>

      <div class="submit-wrapper">
        <button type="submit"><i class="fas fa-paper-plane"></i> Submit Wallpapers</button>
      </div>

      <p class="privacy-note">
        By submitting, you agree to our <a href="/privacy" style="color:var(--accent-hover)">Privacy Policy</a>.
      </p>
    </form>

    <div class="footer-links">
      <a href="/download-wallpapers"><i class="fas fa-download"></i> Download Wallpapers</a>
      <a href="mailto:moealturej@gmail.com"><i class="fas fa-envelope-open-text"></i> Email Us</a>
      <a href="https://discord.gg/moealturej"><i class="fab fa-discord"></i> Discord</a>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js';
      document.body.appendChild(s);
      s.onload = () => particlesJS('particles-js', {
        particles: {
          number:{value:60,density:{enable:true,value_area:700}},
          color:{value:['#bb00ff','#e600ff']},
          shape:{type:'circle', stroke:{width:1,color:'#e600ff'}},
          opacity:{value:0.4,random:true,anim:{enable:true,speed:1,opacity_min:0.1}},
          size:{value:4,random:true,anim:{enable:true,speed:4,size_min:0.7}},
          move:{enable:true,speed:1.3,out_mode:'out'}
        },
        interactivity:{
          detect_on:'canvas',
          events:{onhover:{enable:true,mode:'grab'},onclick:{enable:true,mode:'push'}},
          modes:{grab:{distance:130,line_linked:{opacity:0.5}},push:{particles_nb:4}}
        },
        retina_detect:true
      });
    });

    const maxLinks = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--max-links'));
    const form      = document.getElementById('contactForm');
    const success   = document.getElementById('successMessage');
    const btn       = form.querySelector('button[type="submit"]');
    const icon      = btn.querySelector('i');
    const linksC    = document.getElementById('linksContainer');
    const addBtn    = document.getElementById('addLinkBtn');
    const countEl   = document.getElementById('linkCount');

    function updateCount() {
      const current = linksC.querySelectorAll('.link-row').length;
      countEl.textContent = current;
      addBtn.disabled = current >= maxLinks;
    }

    addBtn.addEventListener('click', () => {
      const currentCount = linksC.querySelectorAll('.link-row').length;
      if (currentCount >= maxLinks) return;

      let idx = parseInt(addBtn.dataset.index, 10) + 1;
      addBtn.dataset.index = idx;

      const row = document.createElement('div');
      row.className = 'link-row';
      row.innerHTML = `
        <div style="flex:1">
          <label><i class="fab fa-steam"></i> Workshop Link*</label>
          <input
            type="url"
            name="workshopLink${idx}"
            placeholder="https://steamcommunity.com/sharedfiles/filedetails/?id=123456789"
            required
          />
        </div>
        <button type="button" class="remove-btn" aria-label="Remove this link">
          <i class="fas fa-times"></i>
        </button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        row.remove();
        updateCount();
      });
      linksC.appendChild(row);
      updateCount();
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (!form.checkValidity()) { form.reportValidity(); return; }
      if (form.website.value.trim() !== '') return;  // honeypot

      btn.classList.add('button--loading');
      icon.classList.replace('fa-paper-plane','fa-spinner');

      const data = new FormData(form);
      try {
        await fetch(form.action, { method:'POST', body:data, headers:{'Accept':'application/json'} });
        form.reset();
        // reset to first row
        linksC.innerHTML = linksC.querySelector('.link-row').outerHTML;
        addBtn.dataset.index = 1;
        success.style.display = 'block';
        updateCount();
      } catch {
        alert('Oops! There was a problem sending your wallpapers.');
      } finally {
        btn.classList.remove('button--loading');
        icon.classList.replace('fa-spinner','fa-paper-plane');
        setTimeout(()=> success.style.display = 'none', 5000);
      }
    });

    updateCount();
  </script>
</body>
</html>
