<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta Tags -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Favicon & Fonts -->
  <link rel="icon" href="https://i.postimg.cc/63hbBb6B/New-logo.jpg" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* Reuse Checkout/Success Theme Variables & Animations */
    :root {
      --bg1: #12002b;
      --bg2: #000a1a;
      --card-bg: rgba(255,255,255,0.05);
      --accent: #bb00ff;
      --accent-hover: #e600ff;
      --text-primary: #f0f0f0;
      --text-secondary: #bbb;
      --error-red: #ff3333;
      --transition: 0.25s ease-out;
      --keyframe-time: 0.4s;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family:'Roboto',sans-serif;
      color:var(--text-primary);
      overflow:hidden;
    }
    #particles-js { position:fixed; inset:0; z-index:-2; }
    .cancel-card {
      position:relative;
      width:100%; max-width:600px;
      background:var(--card-bg);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:16px;
      padding:2.5rem;
      backdrop-filter:blur(10px);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
      animation:cardFadeIn var(--keyframe-time) ease-out both;
    }
    @keyframes cardFadeIn { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }
    @keyframes slideIn { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    .bg-shape { position:absolute; width:200px; height:200px; border-radius:50%;
      background:radial-gradient(circle,var(--accent),transparent 70%);
      filter:blur(60px); opacity:0.7; animation:slideIn var(--keyframe-time) ease-out both;
    }
    .shape1 { top:-50px; left:-50px; animation-delay:0.2s; }
    .shape2 { bottom:-50px; right:-50px; animation-delay:0.4s; }
    .icon {
      font-size:4rem;
      color: var(--error-red);
      text-align:center;
      display:block;
      margin-bottom:1rem;
      animation:slideIn var(--keyframe-time) ease-out both .3s;
    }
    h1 {
      font-family:'Orbitron',sans-serif;
      font-size:2.5rem;
      text-align:center;
      text-transform:uppercase;
      color: var(--error-red);
      margin-bottom:0.5rem;
      animation:slideIn var(--keyframe-time) ease-out both .4s;
    }
    .subtitle {
      text-align:center;
      font-size:1rem;
      color:var(--text-secondary);
      margin-bottom:2rem;
      animation:slideIn var(--keyframe-time) ease-out both .5s;
    }
    .order-summary {
      animation:slideIn var(--keyframe-time) ease-out both .6s;
      text-align:center;
      font-size:1rem;
      color:var(--text-primary);
      margin-bottom:2rem;
    }
    .order-summary strong { color: var(--accent-hover); }
    .product-details {
      animation:slideIn var(--keyframe-time) ease-out both .7s;
    }
    .product-details h3 {
      font-size:1.3rem;
      color:var(--accent-hover);
      margin-bottom:0.75rem;
      text-align:center;
    }
    .product-details p {
      margin-bottom:0.5rem;
      text-align:center;
    }
    .button {
      display:block;
      width:100%; max-width:300px;
      margin:1.5rem auto 0;
      padding:1rem;
      background:linear-gradient(90deg,var(--accent-hover),var(--accent));
      color:#fff;
      text-align:center;
      text-transform:uppercase;
      font-weight:bold;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:transform var(--transition),background var(--transition);
      animation:slideIn var(--keyframe-time) ease-out both .8s;
    }
    .button:hover {
      transform:scale(1.05);
      background:linear-gradient(90deg,var(--accent),var(--accent-hover));
    }
    .footer-note {
      text-align:center;
      font-size:0.85rem;
      color:var(--text-secondary);
      margin-top:2rem;
      animation:slideIn var(--keyframe-time) ease-out both .9s;
    }
    .footer-note a { color: var(--accent-hover); text-decoration:none; }
    .footer-note a:hover { text-decoration:underline; }
    @media(max-width:640px){ .cancel-card{padding:2rem;} h1{font-size:2rem;} }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="cancel-card">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <i class="fa-solid fa-times-circle icon"></i>
    <h1>Payment Canceled</h1>
    <p class="subtitle">Your payment was not completed. No charges were made.</p>

    <div class="order-summary">
      <strong>Invoice:</strong> {{ invoice_id }}
    </div>

    <div class="product-details">
      <h3>Product: {{ product.replace('_',' ').capitalize() }}</h3>
      <p>Plan: <strong>{{ plan }} key</strong></p>
      <p>Email: <strong>{{ email }}</strong></p>
    </div>

    <button class="button" onclick="location.href='/'">Go Back Home</button>
    <p class="footer-note">Need help? <a href="/contact">Contact Support</a></p>
  </div>

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number:{ value:80, density:{ enable:true,value_area:800 }},
        color:{ value:'#fff' },shape:{ type:'circle' },
        opacity:{ value:0.1,random:true },size:{ value:2,random:true },
        move:{ enable:true,speed:1,direction:'none',out_mode:'out'}
      },
      interactivity:{ detect_on:'canvas', events:{ onhover:{ enable:true,mode:'grab'}, onclick:{ enable:true,mode:'push'} }, modes:{ grab:{ distance:120,line_linked:{ opacity:0.2 }}, push:{ particles_nb:3 } } },
      retina_detect:true
    });
  </script>
</body>
</html>
