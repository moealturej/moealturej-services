<!-- 404.html (clean, role-appropriate) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>404 — Page Not Found | moealturej</title>
  <meta name="description" content="Page not found — moealturej" />
  <meta name="robots" content="noindex,follow" />

  <style>
    :root{
      --bg0:#070812;
      --bg1:#0a0f1f;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --muted2: rgba(255,255,255,.52);
      --accent1:#a855f7;
      --accent2:#22d3ee;
      --radius: 18px;
      --shadow: 0 14px 44px rgba(0,0,0,.45);
      --max: 760px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(1100px 650px at 15% 10%, rgba(168,85,247,.14), transparent 55%),
        radial-gradient(900px 600px at 85% 25%, rgba(34,211,238,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 26px 16px;
    }
    a{color:inherit; text-decoration:none}
    .card{
      width:100%;
      max-width: var(--max);
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card::before{
      content:"";
      display:block;
      height: 2px;
      background: linear-gradient(90deg, rgba(168,85,247,.9), rgba(34,211,238,.9));
      opacity:.9;
    }
    .inner{padding: 22px}
    .brand{
      display:flex; align-items:center; gap:10px;
      margin-bottom: 14px;
    }
    .mark{
      width:36px; height:36px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(168,85,247,.95), rgba(34,211,238,.85));
      box-shadow: 0 12px 34px rgba(168,85,247,.16);
    }
    .brand strong{font-weight:850; letter-spacing:.6px; font-size:13px}
    h1{
      margin: 0 0 8px;
      font-size: 46px;
      letter-spacing: -1px;
      line-height: 1;
    }
    p{
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      max-width: 70ch;
    }
    .actions{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top: 6px;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .btn:hover{transform: translateY(-1px); background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.14)}
    .btn.primary{
      border-color: rgba(168,85,247,.30);
      background: linear-gradient(135deg, rgba(168,85,247,.22), rgba(34,211,238,.10));
    }
    .muted{
      margin-top: 16px;
      color: var(--muted2);
      font-size: 12px;
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
  </style>
</head>

<body>
  <main class="card" aria-label="404">
    <div class="inner">
      <a class="brand" href="https://moealturej.com">
        <div class="mark" aria-hidden="true"></div>
        <strong>moealturej</strong>
      </a>

      <h1>404</h1>
      <p>That page isn’t here. It may have moved, or the link is broken.</p>

      <div class="actions">
        <a class="btn primary" href="https://moealturej.com">🏠 Home</a>
        <a class="btn" href="https://discord.gg/moealturej" target="_blank" rel="noopener">💬 Discord</a>
        <a class="btn" href="https://youtube.com/@moealturej" target="_blank" rel="noopener">▶️ YouTube</a>
      </div>

      <div class="muted">
        <span>© <span id="y"></span> moealturej</span>
        <span>New chapter • same name</span>
      </div>
    </div>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
