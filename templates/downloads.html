{% extends "base.html" %}
{% block title %}Downloads | moealturej{% endblock %}
{% block extra_head %}
<style>
  .downloads-page { padding-top: 20px; }
  .downloads-panel { padding: 24px; }
  .downloads-grid { margin-top: 22px; display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; }
  .download-card { display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; background: linear-gradient(180deg, rgba(18,18,30,0.98), rgba(8,8,14,0.98)); border: 1px solid rgba(255,255,255,0.07); box-shadow: var(--shadow-md); }
  .download-image-wrap { padding: 14px; }
  .download-image { width: 100%; aspect-ratio: 1.2 / 1; object-fit: cover; border-radius: 18px; border: 1px solid rgba(255,255,255,0.07); background: linear-gradient(180deg, #1a0f2d, #09090f); }
  .download-body { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; height: 100%; }
  .download-title { font-size: 16px; font-weight: 900; }
  .download-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .download-btn { margin-top: auto; min-height: 46px; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(180deg, rgba(139,44,255,0.96), rgba(93,23,186,0.96)); border: 1px solid rgba(139,44,255,0.28); color: #fff; font-size: 13px; font-weight: 900; }
  .no-downloads { grid-column: 1 / -1; padding: 30px; text-align: center; border-radius: 22px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
  @media (max-width: 1100px) { .downloads-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (max-width: 720px) { .downloads-panel { padding: 18px; } .downloads-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<section class="page-section downloads-page">
  <div class="container">
    <section class="panel downloads-panel">
      <div class="page-head">
        <div class="eyebrow">moealturej downloads</div>
        <h1>Software downloads</h1>
        <p>Instant access downloads for all available products.</p>
      </div>
      <div class="search-wrap">
        <i class="fas fa-magnifying-glass"></i>
        <input id="download-search" class="search-input" type="text" placeholder="Search downloads...">
      </div>
      <div id="downloads-grid" class="downloads-grid"></div>
    </section>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
  const downloadSearch = document.getElementById('download-search');
  const downloadGrid = document.getElementById('downloads-grid');
  let downloads = [];

  function statusMarkup(item) {
    const raw = String(item?.status?.label || item?.status?.state || item?.downloads?.status || 'Ready').toLowerCase();
    if (raw.includes('ready') || raw.includes('online') || raw.includes('operational')) return '<div class="chip is-green"><i class="fas fa-circle"></i> Online</div>';
    if (raw.includes('degraded')) return '<div class="chip is-yellow"><i class="fas fa-triangle-exclamation"></i> Degraded</div>';
    if (raw.includes('offline')) return '<div class="chip is-red"><i class="fas fa-circle-xmark"></i> Offline</div>';
    return `<div class="chip"><i class="fas fa-circle"></i> ${item?.status?.label || item?.downloads?.status || 'Ready'}</div>`;
  }

  function renderDownloads(query = '') {
    const filtered = downloads.filter(item => [item.name, item.description, item.detailedDescription, item.category].join(' ').toLowerCase().includes(query || ''));
    if (!filtered.length) {
      downloadGrid.innerHTML = '<div class="no-downloads"><h3>No downloads found</h3><p>Try a different search.</p></div>';
      return;
    }

    downloadGrid.innerHTML = filtered.map(item => `
      <article class="download-card">
        <div class="download-image-wrap">
          <img class="download-image" src="${item.image || 'https://placehold.co/500x420/10091b/8b2cff?text=Download'}" alt="${item.name || 'Download'}">
        </div>
        <div class="download-body">
          <div class="download-title">${item.name || 'Untitled Download'}</div>
          <div class="download-meta">
            ${statusMarkup(item)}
            <div class="chip"><i class="fas fa-code-branch"></i> ${item?.downloads?.version || 'Latest'}</div>
            <div class="chip"><i class="fas fa-hard-drive"></i> ${item?.downloads?.fileSize || 'Unknown size'}</div>
          </div>
          <a class="download-btn" href="${item?.downloads?.downloadUrl || '#'}"><i class="fas fa-download"></i> Download</a>
        </div>
      </article>
    `).join('');
  }

  async function loadDownloads() {
    try {
      const response = await fetch('/api/downloads');
      if (!response.ok) throw new Error('Failed to load downloads');
      downloads = await response.json();
      renderDownloads();
    } catch (error) {
      downloadGrid.innerHTML = '<div class="no-downloads"><h3>Failed to load downloads</h3><p>Please try again later.</p></div>';
    }
  }

  downloadSearch.addEventListener('input', function () { renderDownloads(this.value.trim().toLowerCase()); });
  loadDownloads();
</script>
{% endblock %}
