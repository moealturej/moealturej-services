{% extends "base.html" %}
{% block title %}500 | Something went wrong{% endblock %}
{% block extra_head %}
<style>
  .error-page { padding-top: 24px; }
  .error-shell { max-width: 820px; margin: 0 auto; padding: 34px; text-align: center; }
  .error-code { display:inline-flex; align-items:center; justify-content:center; padding:10px 16px; border-radius:999px; background: rgba(139,44,255,0.10); border:1px solid rgba(139,44,255,0.22); color:#f3e9ff; font-size:13px; font-weight:900; letter-spacing:.14em; margin-bottom:18px; }
  .error-shell h1 { margin: 0 0 14px; font-size: clamp(40px, 6vw, 62px); }
  .error-shell p { max-width: 620px; margin: 0 auto 24px; }
</style>
{% endblock %}
{% block content %}
<section class="page-section error-page">
  <div class="container">
    <div class="hero-shell error-shell">
      <div class="error-code">500</div>
      <h1>Something went wrong</h1>
      <p>An internal server error occurred while loading this page. Please try again in a moment.</p>
      <div class="btn-row" style="justify-content:center;">
        <a href="/" class="primary-cta">Go Home</a>
        <a href="/products" class="secondary-cta">Browse Store</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
