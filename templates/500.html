{% extends "base.html" %}
{% block title %}500 | Server Error{% endblock %}

{% block content %}
<section class="page-section error-page">
  <div class="container">
    <div class="error-card">
      <div class="error-code">500</div>
      <h1>Something went wrong</h1>
      <p>
        An internal server error occurred while loading this page. Please try again in a moment.
      </p>

      <div class="error-actions">
        <a href="/" class="primary-cta">Go Home</a>
        <a href="/support" class="secondary-cta">Get Support</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_head %}
<style>
  .error-page {
    padding-top: 24px;
  }

  .error-card {
    max-width: 760px;
    margin: 0 auto;
    text-align: center;
    padding: 42px 32px;
    border-radius: var(--radius-xl);
    background: linear-gradient(180deg, rgba(12,12,22,0.88), rgba(8,8,16,0.96));
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 18px 50px rgba(0,0,0,0.32);
  }

  .error-code {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(139, 44, 255, 0.10);
    border: 1px solid rgba(139, 44, 255, 0.24);
    color: #f3e9ff;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.14em;
    margin-bottom: 20px;
  }

  .error-card h1 {
    margin: 0 0 14px;
    font-size: clamp(38px, 5vw, 58px);
    line-height: 0.98;
    letter-spacing: -0.04em;
  }

  .error-card p {
    max-width: 580px;
    margin: 0 auto;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.8;
  }

  .error-actions {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .primary-cta,
  .secondary-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 170px;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 800;
    transition: 0.2s ease;
    border: 1px solid transparent;
  }

  .primary-cta {
    background: linear-gradient(135deg, var(--purple), var(--purple-2));
    color: #fff;
    box-shadow: 0 12px 30px rgba(139, 44, 255, 0.24);
  }

  .primary-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 38px rgba(139, 44, 255, 0.30);
  }

  .secondary-cta {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: #fff;
  }

  .secondary-cta:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
  }

  @media (max-width: 640px) {
    .error-card {
      padding: 28px 20px;
      border-radius: 18px;
    }

    .primary-cta,
    .secondary-cta {
      width: 100%;
    }
  }
</style>
{% endblock %}
